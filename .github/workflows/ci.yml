name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: install postgresql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: make e2e

  release:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: install svu
        run: go install github.com/caarlos0/svu/v3@latest
      - name: Compute next version
        id: svu
        run: |
          CURRENT=$(svu current)
          NEXT=$(svu next)
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          [ "$CURRENT" != "$NEXT" ] && echo "skip=false" >> "$GITHUB_OUTPUT" || echo "skip=true" >> "$GITHUB_OUTPUT"
      - name: tag
        if: steps.svu.outputs.skip == 'false'
        run: git tag "${{ steps.svu.outputs.next }}"
      - uses: goreleaser/goreleaser-action@v7
        if: steps.svu.outputs.skip == 'false'
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.svu.outputs.next }}
